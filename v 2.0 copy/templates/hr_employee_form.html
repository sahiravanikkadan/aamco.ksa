{% extends "base.html" %}
{% block title %}{{ 'Edit' if employee else 'Add' }} Employee - HR{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-person-plus text-primary"></i> {{ 'Edit' if employee else 'Add' }} Employee</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Employee Name <span class="text-danger">*</span></label>
                            <input type="text" name="employee_name" class="form-control" value="{{ employee.employee_name if employee else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Employee ID</label>
                            <input type="text" name="employee_id" class="form-control" value="{{ employee.employee_id if employee else '' }}" placeholder="e.g. EMP-001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Phone</label>
                            <input type="text" name="phone" class="form-control" value="{{ employee.phone if employee else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Designation</label>
                            <input type="text" name="designation" class="form-control" value="{{ employee.designation if employee else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Joining Date <span class="text-danger">*</span></label>
                            <input type="date" name="joining_date" class="form-control" value="{{ employee.joining_date if employee else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Link to User Account</label>
                            <select name="user_id" class="form-select">
                                <option value="">-- None --</option>
                                {% for u in users %}
                                <option value="{{ u.id }}" {% if employee and employee.user_id == u.id %}selected{% endif %}>{{ u.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-12"><hr><h6 class="text-muted"><i class="bi bi-currency-dollar"></i> Salary Details (Monthly)</h6></div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Basic Salary</label>
                            <input type="number" step="0.01" name="basic_salary" class="form-control" value="{{ employee.basic_salary if employee else '0' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Housing Allowance</label>
                            <input type="number" step="0.01" name="housing_allowance" class="form-control" value="{{ employee.housing_allowance if employee else '0' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Transport Allowance</label>
                            <input type="number" step="0.01" name="transport_allowance" class="form-control" value="{{ employee.transport_allowance if employee else '0' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Other Allowance</label>
                            <input type="number" step="0.01" name="other_allowance" class="form-control" value="{{ employee.other_allowance if employee else '0' }}">
                        </div>

                        <div class="col-12"><hr><h6 class="text-muted"><i class="bi bi-airplane"></i> Travel Ticket</h6></div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Annual Ticket Amount (SAR)</label>
                            <input type="number" step="0.01" name="ticket_amount" class="form-control" value="{{ employee.ticket_amount if employee else '0' }}">
                            <small class="text-muted">Eligible after 1 year of service</small>
                        </div>

                        {% if employee %}
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Status</label>
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if employee.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="isActive">Active</label>
                            </div>
                        </div>
                        {% endif %}
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {{ 'Update' if employee else 'Add' }} Employee</button>
                        <a href="{{ url_for('hr_employees') }}" class="btn btn-secondary ms-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
