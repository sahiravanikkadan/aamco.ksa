{% extends "base.html" %}
{% block title %}About - AAMCO{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body py-5 px-4">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="AAMCO" height="60" class="mb-3">
                <h4 class="fw-bold mb-1">AAMCO Task Manager</h4>
                <p class="text-muted mb-4">Airscent Arabia Manufacturing Co.</p>

                <div class="p-3 rounded-3 mb-4" style="background:#f0f7ff;border:1px solid #bfdbfe;">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Version</span>
                        <strong>1.0</strong>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted">Platform</span>
                        <strong>Web Application</strong>
                    </div>
                </div>

                <div class="p-3 rounded-3 mb-4" style="background:#f8fafc;">
                    <h6 class="text-muted mb-3"><i class="bi bi-person-gear text-primary me-1"></i>Developer</h6>
                    <p class="fw-bold fs-5 mb-0">Sahirsha Shajahan</p>
                </div>

                <hr>
                <p class="text-muted small mb-0">&copy; AAMCO 2026. All rights reserved.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
