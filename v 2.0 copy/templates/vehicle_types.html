{% extends "base.html" %}
{% block title %}Vehicle Types - AAMCO{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-car-front"></i> Vehicle Types</h4>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addVTypeModal">
        <i class="bi bi-plus-lg"></i> Add Vehicle Type
    </button>
</div>

<div class="row g-3">
    {% for vt in vehicle_types %}
    <div class="col-md-4">
        <div class="card shadow-sm border-0 list-row" style="border-radius:12px;">
            <div class="card-body py-3 px-4 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                         style="width:40px;height:40px;background:linear-gradient(135deg,#1a73e8,#0a4da6);color:white;font-size:1rem;flex-shrink:0;">
                        <i class="bi bi-truck"></i>
                    </div>
                    <div>
                        <div class="fw-bold">{{ vt.name }}</div>
                        <small class="text-muted">Added {{ vt.created_at[:10] if vt.created_at else '-' }}</small>
                    </div>
                </div>
                <a href="{{ url_for('delete_vehicle_type', vtype_id=vt.id) }}" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-trash"></i>
                </a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12">
        <div class="card shadow-sm border-0 text-center py-5" style="border-radius:12px;">
            <div class="card-body">
                <i class="bi bi-car-front text-muted" style="font-size:3rem;"></i>
                <p class="text-muted mt-2 mb-3">No vehicle types found</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<!-- Add Vehicle Type Modal -->
<div class="modal fade" id="addVTypeModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content border-0" style="border-radius:16px;overflow:hidden;">
            <div class="modal-header py-3" style="background:linear-gradient(135deg,#1a73e8 0%,#0a4da6 100%);">
                <h5 class="modal-title text-white"><i class="bi bi-plus-circle me-2"></i>Add Vehicle Type</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{{ url_for('add_vehicle_type') }}">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label">Vehicle Type Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g. Pickup, Van, Truck...">
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Add</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
